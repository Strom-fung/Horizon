name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 */2 * *'  # 每2天运行一次 (UTC 00:00 = 北京时间 08:00)
  workflow_dispatch:      # 允许手动触发

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes
      pages: write     # Needed for GitHub Pages deployment
      id-token: write  # Needed for GitHub Pages deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your data/config.github.json provider settings
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Create gh-pages branch if it doesn't exist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if ! git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout --orphan gh-pages
            git rm -rf .
            git commit --allow-empty -m "Initial gh-pages commit"
            git push origin gh-pages
            git checkout -
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: false
